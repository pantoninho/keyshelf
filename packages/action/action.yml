name: keyshelf
description: Resolve keyshelf-managed config and secrets into $GITHUB_ENV with auto-masking for secret keys
branding:
  icon: key
  color: purple

inputs:
  env:
    description: Environment name. Required only when at least one selected key has env-specific values without a fallback.
    required: false
    default: ""
  map:
    description: Path(s) to .env.keyshelf mapping file(s); newline-separated for multiple
    required: true
  identity:
    description: Raw identity material (e.g. age private key). Written with mode 0600 to every identityFile path declared by age and sops providers in the config. Pass via secrets.* — never hard-code.
    required: false
    default: ""
  working-directory:
    description: Directory containing keyshelf.config.ts
    required: false
    default: "."
  groups:
    description: Comma- or newline-separated list of groups to include
    required: false
    default: ""
  filters:
    description: Comma- or newline-separated list of key-path prefixes to include
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Validate inputs
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ ! -f "keyshelf.config.ts" ]; then
          echo "::error::keyshelf.config.ts not found in $(pwd)"
          exit 1
        fi
        if [ -z "${{ inputs.map }}" ]; then
          echo "::error::'map' is required"
          exit 1
        fi

    - name: Install runtime deps
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        # jiti and zod are externalized from the bundle (see tsup.config.ts).
        # Install them locally to the action so dist/*.mjs can resolve them.
        if [ ! -d "node_modules/jiti" ] || [ ! -d "node_modules/zod" ]; then
          npm install --no-save --no-audit --no-fund --no-package-lock jiti@^2.6.1 zod@^4.4.1
        fi

    - name: Write identity
      if: inputs.identity != ''
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        KEYSHELF_IDENTITY: ${{ inputs.identity }}
        KEYSHELF_CONFIG_MODULE_PATH: ${{ github.action_path }}/dist/keyshelf-config.mjs
      run: node "${{ github.action_path }}/dist/write-identity.mjs"

    - name: Resolve and emit env vars
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        KEYSHELF_ENV: ${{ inputs.env }}
        KEYSHELF_MAPS: ${{ inputs.map }}
        KEYSHELF_GROUPS: ${{ inputs.groups }}
        KEYSHELF_FILTERS: ${{ inputs.filters }}
        KEYSHELF_CONFIG_MODULE_PATH: ${{ github.action_path }}/dist/keyshelf-config.mjs
      run: node "${{ github.action_path }}/dist/emit-env.mjs"
