name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Cheap, sops-free quality gate: eslint + prettier. Runs in parallel with the
  # heavier test job so lint/format failures surface fast and gate every PR.
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run format:check

      # Build the CLI and validate every examples/ project against it so the
      # examples can't silently rot. Uses the self-contained `fake` adapter, so
      # no sops/cloud creds are needed — it belongs in this cheap quality lane.
      - run: npm run validate:examples

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      # The hermetic sops conformance + E2E matrix needs a real sops + age on the
      # runner (the bundled per-platform packages are not yet published, so the
      # adapter finds sops via its PATH fallback). Pinned for reproducibility.
      - name: Install sops + age
        run: |
          SOPS_VERSION=v3.13.1
          AGE_VERSION=v1.2.1
          curl -fsSL -o /usr/local/bin/sops \
            "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64"
          chmod +x /usr/local/bin/sops
          curl -fsSL "https://github.com/FiloSottile/age/releases/download/${AGE_VERSION}/age-${AGE_VERSION}-linux-amd64.tar.gz" \
            | tar -xz -C /tmp
          sudo install /tmp/age/age /tmp/age/age-keygen /usr/local/bin/

      - name: Assert sops + age are present (so the matrix runs, never silently skips)
        run: |
          sops --version --disable-version-check
          age-keygen --version
          command -v sops
          command -v age-keygen

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build -w keyshelf

      # Cache the per-platform sops binaries the platform-package tests download
      # (~250MB across five platforms). Keyed on sops-version.json so a version
      # bump re-fetches; otherwise the Tier 1/Tier 2 suites reuse the cached
      # binaries instead of re-downloading. The generator verifies each cached
      # binary's SHA256 before use, so a poisoned cache cannot taint the build.
      - name: Cache bundled sops binaries
        uses: actions/cache@v4
        with:
          path: packages/cli/.cache/sops-binaries
          key: sops-binaries-${{ hashFiles('packages/cli/sops-version.json') }}

      # Build + integrity-verify all five platform packages once, up front, so the
      # binaries are present and checksum-verified before the test suite (which
      # reuses them) runs — and so a tampered binary fails CI here.
      - run: npm run platforms:build -w keyshelf

      - run: npm test -w keyshelf

  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
