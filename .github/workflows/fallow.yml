name: fallow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fallow:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: fallow-rs/fallow@v2.64.0
        with:
          format: json
          comment: true
          fail-on-issues: true
